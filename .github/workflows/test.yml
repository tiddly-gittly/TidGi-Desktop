name: Test

on:
  workflow_call:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          # Node 24.16.0 breaks extract-zip/yauzl, causing Electron packaging to exit 0 with no output.
          node-version: 24.15.0
          cache: 'pnpm'

      - name: Install build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # pnpm git deps (e.g. @electron/node-gyp) resolve to git@github.com on Windows CI
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm exec electron-rebuild -f -w better-sqlite3,nsfw

      - name: Run unit tests
        run: pnpm run test:unit
        env:
          CI: true
        timeout-minutes: 5

      - name: Run linting
        run: pnpm run lint --max-warnings 0

  e2e:
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2022
        shard:
          - 1
          - 2
          - 3
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          # Node 24.16.0 breaks extract-zip/yauzl, causing Electron packaging to exit 0 with no output.
          node-version: 24.15.0
          cache: 'pnpm'

      # Linux: Install C++ build tools for native modules (nsfw, better-sqlite3)
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # Windows: Set up MSVC compiler for native modules (nsfw, better-sqlite3)
      - name: Set up MSVC compiler (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # pnpm git deps (e.g. @electron/node-gyp) resolve to git@github.com on Windows CI
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Linux: electron-rebuild without MSVC
      - name: Rebuild native modules for Electron (Linux)
        if: runner.os == 'Linux'
        run: pnpm exec electron-rebuild -f -w better-sqlite3,nsfw

      # Windows: electron-rebuild requires MSVC environment via cmd shell
      - name: Rebuild native modules for Electron (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          pnpm exec electron-rebuild -f -w better-sqlite3,nsfw

      # Linux: Install headless GUI stack for Electron (xvfb), CJK fonts and locale for i18n tests
      # https://www.electronjs.org/docs/latest/tutorial/testing-on-headless-ci
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          # Install Chinese fonts and locale support for i18n testing
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei language-pack-zh-hans
          sudo locale-gen zh_CN.UTF-8

      - name: Prepare E2E
        run: pnpm run test:prepare-e2e
        env:
          CI: true
        timeout-minutes: 15

      # Debug: see what electron-forge actually produced
      - name: List packaging output
        shell: bash
        run: |
          echo "=== out/ directory ==="
          ls -la out/ 2>/dev/null || echo "out/ does not exist"
          echo "=== out/TidGi-*-x64/ ==="
          ls -laR out/TidGi-*-x64/ 2>/dev/null || echo "No TidGi-*-x64 directory"

      # Assert packaged executable exists so failures stop at packaging, not at E2E runtime
      - name: Verify packaged executable exists
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f "out/TidGi-win32-x64/tidgi.exe" || { echo "ERROR: Packaged executable not found at out/TidGi-win32-x64/tidgi.exe"; exit 1; }
            echo "Verified: out/TidGi-win32-x64/tidgi.exe exists"
          else
            test -f "out/TidGi-linux-x64/tidgi" || { echo "ERROR: Packaged executable not found at out/TidGi-linux-x64/tidgi"; exit 1; }
            echo "Verified: out/TidGi-linux-x64/tidgi exists"
          fi

      # Linux: Run E2E under xvfb for virtual display
      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 2560x1440x24" pnpm run test:e2e 2>&1 | tee e2e-output.log
          E2E_EXIT=${PIPESTATUS[0]}
          exit ${E2E_EXIT}
        shell: bash
        env:
          CI: true
          DISPLAY: :99
          # Set Chinese locale for i18n testing
          LANG: zh_CN.UTF-8
          LC_ALL: zh_CN.UTF-8
          # E2E test sharding — splits feature files across parallel CI runners
          TIDGI_E2E_SHARD: 3/${{ matrix.shard }}
        timeout-minutes: 30

      # Windows: Run E2E directly — Windows CI runners provide a display
      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pnpm run test:e2e 2>&1 | tee e2e-output.log
          E2E_EXIT=${PIPESTATUS[0]}
          exit ${E2E_EXIT}
        env:
          CI: true
          # E2E test sharding — splits feature files across parallel CI runners
          TIDGI_E2E_SHARD: 3/${{ matrix.shard }}
        timeout-minutes: 30

      # Upload test artifacts (screenshots, logs, settings)
      - name: Collect test artifacts
        if: always()
        run: |
          mv test-artifacts test-artifacts-ci || true
          # Remove large cache folders to save space, keep only logs and settings
          find test-artifacts-ci -type d \( -name "Cache" -o -name "Code Cache" -o -name "GPUCache" -o -name "DawnGraphiteCache" -o -name "DawnWebGPUCache" -o -name "Crashpad" -o -name "cache-database" -o -name "DevToolsActivePort" -o -name "Dictionaries" -o -name "Local Storage" -o -name "Network Persistent State" -o -name "Partitions" -o -name "Session Storage" -o -name "Shared Dictionary" \) -exec rm -rf {} + || true
          echo "Cleaned up test-artifacts-ci cache folders"
        shell: bash
        continue-on-error: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-ci-${{ matrix.os }}-${{ matrix.shard }}
          path: |
            test-artifacts-ci/**/logs/
            test-artifacts-ci/**/settings/
            test-artifacts-ci/**/screenshots/
          retention-days: 7
        continue-on-error: true
